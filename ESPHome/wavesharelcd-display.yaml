substitutions:
  name: change-me
  eventsTopic: change-me2

esphome:
  name: ${name}-booking-display
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.arduino.memory_type: qio_opi
    board_build.flash_mode: dio
    board_upload.maximum_ram_size: 524288
  on_boot:
    - priority: 250
      then:
        #- light.turn_on:
        #    id: occupied_light
        #    red: 0%
        #    green: 0%
        #    blue: 80%
        #    effect: Scan
        - logger.log: "Booting up..."
        - script.execute: actual_update

psram:
  mode: octal
  speed: 120MHz

## The board to use
esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      COMPILER_OPTIMIZATION_SIZE: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: "y"
      CONFIG_FREERTOS_HZ: "1000"
      CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ_240: y
      CONFIG_ESPTOOLPY_FLASHMODE_QIO: y
      CONFIG_ESPTOOLPY_FLASHFREQ_120M: y
      CONFIG_SPIRAM_MODE_OCT: y
      CONFIG_IDF_EXPERIMENTAL_FEATURES: y
      CONFIG_SPIRAM_SPEED_120M: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: y
      CONFIG_COMPILER_OPTIMIZATION_PERF: y

i2c:
  sda: GPIO08
  scl: GPIO09
  scan: True
  id: bus_a

### IO Extender
ch422g:
  - id: ch422g_hub

# Enable logging
logger:
  level: DEBUG
#  logs:
#    light: ERROR

## Include shared functionallity
<<: !include ./common/binary_sensor.yaml
<<: !include ./common/button.yaml
<<: !include ./common/connections.yaml
<<: !include ./common/globals.yaml
<<: !include ./common/sensor.yaml
<<: !include ./common/text_sensor.yaml
<<: !include ./common/time.yaml
<<: !include ./common/scripts.yaml
#<<: !include ./common/lights.yaml


switch:
  - platform: safe_mode
    name: Use Safe Mode
    id: device_safe_mode

  - platform: gpio
    id: lcdbacklight
    name: lcdbacklight
    pin:
      ch422g: ch422g_hub
      number: 2
      mode:
        output: true
      inverted: false
    restore_mode: ALWAYS_ON

font:
  # Regular fonts
  - file: "gfonts://Roboto"
    id: h1
    size: 80
    extras:
      file: "gfonts://Roboto"
      glyphs: "ÅÄÖåäöÁÉáé"
  - file: "gfonts://Roboto"
    id: h2
    size: 55
    extras:
      file: "gfonts://Roboto"
      glyphs: "ÅÄÖåäöÁÉáé"
  - file: "gfonts://Roboto"
    id: h3
    size: 35
    extras:
      file: "gfonts://Roboto"
      glyphs: "ÅÄÖåäöÁÉáé"
  # Light Fonts
  - file:
      type: gfonts
      family: Roboto
      weight: bold
    id: h1_semi_bold
    size: 80
    extras:
      file: "gfonts://Roboto"
