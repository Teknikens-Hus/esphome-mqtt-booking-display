    id: h3_semi_bold
    size: 35
    extras:
      file: "gfonts://Roboto"
      glyphs: "ÅÄÖåäöÁÉáé"

# 800 x 480 pixels
display:
  - platform: rpi_dpi_rgb
    id: displayid
    update_interval: never
    auto_clear_enabled: false
    color_order: RGB
    pclk_frequency: 16MHZ
    dimensions:
      width: 800
      height: 480
    de_pin:
      number: 5
    hsync_pin:
      number: 46
      ignore_strapping_warning: true
    vsync_pin:
      number: 3
      ignore_strapping_warning: true
    pclk_pin: 7
    pclk_inverted: true
    reset_pin:
      ch422g: ch422g_hub
      number: 3
#    enable_pin:
#      ch422g: ch422g_hub
#      number: 2  
    hsync_back_porch: 8
    hsync_front_porch: 8
    hsync_pulse_width: 4
    vsync_back_porch: 16
    vsync_front_porch: 16
    vsync_pulse_width: 4
    data_pins:
      red:
        - 1         #r3
        - 2         #r4
        - 42        #r5
        - 41        #r6
        - 40        #r7
      blue:
        - 14        #b3
        - 38        #b4
        - 18        #b5
        - 17        #b6
        - 10        #b7
      green:
        - 39        #g2
        - 0         #g3
        - 45        #g4
        - 48        #g5
        - 47        #g6
        - 21        #g7
    pages:
      - id: page1
        lambda: |-
          // Get the screen dimensions
          auto screenX = it.get_width();
          auto screenY = it.get_height();
          //ESP_LOGD("DISPLAY", "Screen dimensions: %dx%d", screenX, screenY);
          // These should match the font sizes in the font definition above
          int h1Size = 80;
          int h2Size = 55;
          int h3Size = 35;

          int edgePadding = 20;
          int intentPixels = 20;

          std::string name = "${name}";

          if(!name.empty()) {
            name[0] = std::toupper(name[0]);
          }

          // Fill background
          //it.fill(COLOR_ON);

          Color TextColor = COLOR_ON;

          // Show loading screen before data is received.
          int yPosition = edgePadding;
          // Print the room name:
          it.printf(edgePadding, yPosition, id(h1_semi_bold), TextColor, name.c_str());
          //
          yPosition += h1Size;
          // Print the date to the right of the room name:
          it.strftime(edgePadding, yPosition, id(h3), TextColor, "%d/%m %Y", id(esptime).now());
          //
          int lineThickness = 4;
          yPosition += h3Size + edgePadding; // 10 pixels between the date and the line
          // Draw line under the room name and date: Coords are X Y then size X Y 
          it.filled_rectangle(0, yPosition, screenX, lineThickness, TextColor);
          yPosition += edgePadding;

          if (id(initial_data_received) == false) {
            it.printf(edgePadding, yPosition, id(h2_semi_bold), TextColor, "WAITING FOR DATA...");
            ESP_LOGD("DISPLAY", "Waiting for data...");
            return;
          } else {

            std::string jsonString = id(calevents).state;
            DynamicJsonDocument doc(1024);
            auto error = deserializeJson(doc, jsonString);

            if (error) {
              it.printf(edgePadding, yPosition, id(h2_semi_bold), TextColor, "ERROR PARSING JSON");
              return;
            }

            JsonArray bookings = doc.as<JsonArray>();
            
            // From here the bookings are filtered and only the upcoming ones are left.
            if(bookings.size() == 0) {
              it.printf(edgePadding, yPosition, id(h2_semi_bold), TextColor, "No bookings today!");
              ESP_LOGD("DISPLAY", "No upcoming events");
            } else {
              //ESP_LOGD("DISPLAY", "Filtered bookings found %d", bookings.size());
              for (size_t i = 0; i < bookings.size() && i < 4; ++i) {
                JsonObject booking = bookings[i];
                std::string summary = booking["summary"].as<std::string>();
                std::string start = booking["start"].as<std::string>();
                std::string end = booking["end"].as<std::string>();
                if (i == 0) {
                  // Print the first booking name:
                  it.printf(edgePadding, yPosition, id(h2_semi_bold), TextColor, summary.c_str());
                  yPosition += h2Size;
                  it.printf(edgePadding, yPosition, id(h2_semi_bold), TextColor, (start + " - " + end).c_str());
                  yPosition += h2Size;
                } else {
                  // Print the rest of the bookings:
                  yPosition += h2Size;
                  it.printf(edgePadding + intentPixels, yPosition, id(h3_semi_bold), TextColor, ("- " + start + " - " + end + " " + summary).c_str());
                }
              }
            }
          }

### Touchscreen
touchscreen:
  platform: gt911
  id: my_touch
  interrupt_pin: GPIO4
  reset_pin:
    ch422g: ch422g_hub
    number: 1
    mode: OUTPUT
  on_touch:
    - lambda: |-
        ESP_LOGI("Touch", "Touch detected at x=%d, y=%d", touch.x, touch.y);
  on_update:
    - lambda: |-
          for (auto touch: touches)  {
              if (touch.state <= 2) {
                ESP_LOGI("Touch points:", "id=%d x=%d, y=%d x.raw=%d, y.raw=%d", touch.id, touch.x, touch.y, touch.x_raw, touch.y_raw);
              }
          }  
